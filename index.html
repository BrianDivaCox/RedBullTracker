<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red Bull Master Tracker</title>
    <style>
        :root {
            --bg-color: #0c1020;
            --card-bg: #161d36;
            --text-color: #f1f5f9;
            --text-muted: #94a3b8;
            --rb-blue: #002244;
            --rb-red: #e4002b;
            --rb-yellow: #ffcc00;
            --rb-neon-cyan: #0ea5e9;
            --accent-glow: rgba(255, 204, 0, 0.15);
            --border-color: #242f53;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 20px; line-height: 1.5; }
        .container { max-width: 1100px; margin: 0 auto; }

        header {
            text-align: center; padding: 30px 20px;
            background: linear-gradient(135deg, #091124 0%, #111a36 100%);
            border-radius: 16px; margin-bottom: 30px; border: 1px solid var(--border-color);
            position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        header::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
            background: linear-gradient(90deg, var(--rb-blue), var(--rb-red), var(--rb-yellow));
        }
        
        .version-tag {
            background: #1e293b; color: var(--rb-yellow); font-size: 0.8rem; font-weight: 600;
            padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border-color);
            display: inline-block; margin-bottom: 10px; cursor: pointer; transition: all 0.2s;
        }
        .version-tag:hover { background: #334155; transform: scale(1.05); }

        header h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 10px; }
        header p { color: var(--text-muted); font-size: 1.1rem; margin-bottom: 20px; }
