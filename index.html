
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red Bull Master Tracker</title>
    <style>
        :root {
            --bg-color: #0c1020;
            --card-bg: #161d36;
            --text-color: #f1f5f9;
            --text-muted: #94a3b8;
            --rb-blue: #002244;
            --rb-red: #e4002b;
            --rb-yellow: #ffcc00;
            --accent-glow: rgba(255, 204, 0, 0.15);
            --border-color: #242f53;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; }

        header {
            text-align: center; padding: 30px 20px;
            background: linear-gradient(135deg, #091124 0%, #111a36 100%);
            border-radius: 16px; margin-bottom: 30px; border: 1px solid var(--border-color);
            position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        header::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
            background: linear-gradient(90deg, var(--rb-blue), var(--rb-red), var(--rb-yellow));
        }
        header h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 10px; }
        header p { color: var(--text-muted); font-size: 1.1rem; margin-bottom: 20px; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; }
        .stat-card { background: var(--card-bg); padding: 15px; border-radius: 12px; border: 1px solid var(--border-color); text-align: center; }
        .stat-card .num { font-size: 2rem; font-weight: 700; color: var(--rb-yellow); display: block; }
        .stat-card .label { font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }

        .controls { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 25px; justify-content: space-between; align-items: center; background: var(--card-bg); padding: 15px; border-radius: 12px; border: 1px solid var(--border-color); }
        .search-box { flex: 1; min-width: 260px; }
        .search-box input { width: 100%; padding: 10px 15px; background: var(--bg-color); border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-color); }
        .search-box input:focus { border-color: var(--rb-yellow); outline: none; }
        .filter-buttons { display: flex; gap: 8px; }
        .btn { background: var(--bg-color); border: 1px solid var(--border-color); color: var(--text-color); padding: 8px 16px; border-radius: 8px; cursor: pointer; }
        .btn.active { background: var(--rb-yellow); color: #000; font-weight: 600; }

        .flavor-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .flavor-card { background: var(--card-bg); border-radius: 14px; border: 1px solid var(--border-color); padding: 20px; display: flex; flex-direction: column; cursor: pointer; transition: transform 0.2s; }
        .flavor-card:hover { transform: translateY(-2px); border-color: #3b4b75; }
        .flavor-card.checked { border-color: var(--rb-yellow); }

        .card-header { display: flex; align-items: flex-start; gap: 15px; margin-bottom: 15px; }
        .checkbox-container { position: relative; width: 24px; height: 24px; }
        .checkbox-container input { opacity: 0; width: 0; height: 0; }
        .checkmark { position: absolute; top: 0; left: 0; height: 24px; width: 24px; background: var(--bg-color); border: 2px solid var(--border-color); border-radius: 6px; }
        .checkbox-container input:checked ~ .checkmark { background: var(--rb-yellow); border-color: var(--rb-yellow); }
        .checkmark:after { content: ""; position: absolute; display: none; left: 8px; top: 4px; width: 5px; height: 10px; border: solid #000; border-width: 0 2.5px 2.5px 0; transform: rotate(45deg); }
        .checkbox-container input:checked ~ .checkmark:after { display: block; }
        .flavor-title { font-size: 1.15rem; font-weight: 600; color: #fff; }

        .badge-container { display: flex; gap: 6px; margin-top: auto; }
        .badge { font-size: 0.75rem; padding: 3px 8px; border-radius: 4px; font-weight: 600; text-transform: uppercase; }
        .badge.active-status { background: rgba(34, 197, 94, 0.15); color: #4ade80; }
        .badge.discontinued-status { background: rgba(239, 68, 68, 0.15); color: #f87171; }
        .badge.sugar-free { background: rgba(59, 130, 246, 0.15); color: #60a5fa; }
        .badge.seasonal { background: rgba(168, 85, 247, 0.15); color: #c084fc; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>Red Bull Master Tracker</h1>
        <p>Track every single flavor variant—past, present, and seasonal.</p>
        <div class="stats-grid">
            <div class="stat-card"><span class="num" id="stat-progress">0%</span><span class="label">Total Progress</span></div>
            <div class="stat-card"><span class="num" id="stat-count">0 / 0</span><span class="label">Flavors Had</span></div>
            <div class="stat-card"><span class="num" id="stat-remaining">0</span><span class="label">Remaining</span></div>
        </div>
    </header>

    <div class="controls">
        <div class="search-box"><input type="text" id="search-input" placeholder="Search flavors..."></div>
        <div class="filter-buttons">
            <button class="btn active" onclick="filterFlavors('all', this)">All</button>
            <button class="btn" onclick="filterFlavors('active', this)">Active</button>
            <button class="btn" onclick="filterFlavors('discontinued', this)">Discontinued</button>
            <button class="btn" onclick="filterFlavors('sf', this)">Sugar Free</button>
        </div>
    </div>
    <div class="flavor-grid" id="flavor-grid"></div>
</div>

<script>
    const flavors = [
        { id: 1, name: "Original Red Bull Energy Drink", sf: true, discontinued: false, seasonal: false, checked: true },
        { id: 2, name: "Red Bull Zero", sf: false, discontinued: false, seasonal: false, checked: false },
        { id: 3, name: "The Spring Edition: Cherry Sakura (2026)", sf: false, discontinued: false, seasonal: true, checked: false },
        { id: 4, name: "The Summer Edition: Sudachi Lime (2026)", sf: false, discontinued: false, seasonal: true, checked: false },
        { id: 5, name: "The Ice Edition: Iced Vanilla Berry", sf: false, discontinued: false, seasonal: false, checked: true },
        { id: 6, name: "The Peach Edition: White Peach", sf: false, discontinued: false, seasonal: false, checked: false },
        { id: 7, name: "The Pink Edition: Wild Berries", sf: false, discontinued: false, seasonal: false, checked: true },
        { id: 8, name: "The Sea Blue Edition: Juneberry", sf: false, discontinued: false, seasonal: false, checked: true },
        { id: 9, name: "The Red Edition: Watermelon", sf: false, discontinued: false, seasonal: false, checked: true },
        { id: 10, name: "The Yellow Edition: Tropical", sf: true, discontinued: false, seasonal: false, checked: true },
        { id: 11, name: "The Coconut Edition: Coconut Berry", sf: false, discontinued: false, seasonal: false, checked: true },
        { id: 12, name: "The Amber Edition: Strawberry Apricot", sf: false, discontinued: false, seasonal: false, checked: true },
        { id: 13, name: "The Blue Edition: Blueberry", sf: false, discontinued: true, seasonal: false, checked: false },
        { id: 14, name: "The Green Edition: Dragon Fruit", sf: false, discontinued: true, seasonal: false, checked: false },
        { id: 15, name: "The Green Edition: Curuba Elderflower", sf: false, discontinued: true, seasonal: false, checked: false },
        { id: 16, name: "The Peach Edition: Peach Nectarine", sf: false, discontinued: true, seasonal: false, checked: false },
        { id: 17, name: "The Red Edition Sugarfree: Watermelon Sugarfree", sf: true, discontinued: true, seasonal: false, checked: false },
        { id: 18, name: "The Amber Edition Sugarfree: Strawberry Apricot Sugarfree", sf: true, discontinued: true, seasonal: false, checked: false },
        { id: 19, name: "The Red Edition: Cranberry (Original 2013)", sf: false, discontinued: true, seasonal: false, checked: false },
        { id: 20, name: "The Silver Edition: Dry Lime", sf: false, discontinued: true, seasonal: false, checked: false },
        { id: 21, name: "The Orange Edition: Orange Mango (Total Zero)", sf: true, discontinued: true, seasonal: false, checked: false },
        { id: 22, name: "The Cherry Edition: Wild Cherry (Total Zero)", sf: true, discontinued: true, seasonal: false, checked: false },
        { id: 23, name: "The Winter Edition: Plum Twist", sf: false, discontinued: true, seasonal: true, checked: false },
        { id: 24, name: "The Winter Edition: Pomegranate", sf: false, discontinued: true, seasonal: true, checked: false },
        { id: 25, name: "The Winter Edition: Fig Apple", sf: false, discontinued: true, seasonal: true, checked: false },
        { id: 26, name: "The Winter Edition: Arctic Berry", sf: false, discontinued: true, seasonal: true, checked: false },
        { id: 27, name: "The Summer Edition: Grapefruit Twist", sf: false, discontinued: true, seasonal: true, checked: false },
        { id: 28, name: "The Summer Edition: Beach Breeze", sf: false, discontinued: true, seasonal: true, checked: false },
        { id: 29, name: "The Summer Edition: Kiwi Twist / Kiwi Apple", sf: false, discontinued: true, seasonal: true, checked: false },
        { id: 30, name: "The Purple Edition: Acai Berry", sf: false, discontinued: true, seasonal: false, checked: false },
        { id: 31, name: "Red Bull Simply Cola (Original US Formula)", sf: false, discontinued: true, seasonal: false, checked: false },
        { id: 32, name: "Red Bull Energy Shot (2oz)", sf: false, discontinued: true, seasonal: false, checked: false }
    ];

    let currentFilter = 'all'; let searchQuery = '';

    function loadSavedState() {
        flavors.forEach(flavor => {
            const savedValue = localStorage.getItem('rb_flavor_' + flavor.id);
            if (savedValue !== null) flavor.checked = savedValue === 'true';
        });
    }

    function calculateStats() {
        const total = flavors.length; const checkedCount = flavors.filter(f => f.checked).length;
        document.getElementById('stat-progress').innerText = Math.round((checkedCount / total) * 100) + "%";
        document.getElementById('stat-count').innerText = checkedCount + " / " + total;
        document.getElementById('stat-remaining').innerText = total - checkedCount;
    }

    function renderGrid() {
        const grid = document.getElementById('flavor-grid'); grid.innerHTML = '';
        const filtered = flavors.filter(f => {
            if (searchQuery && !f.name.toLowerCase().includes(searchQuery.toLowerCase())) return false;
            if (currentFilter === 'active') return !f.discontinued;
            if (currentFilter === 'discontinued') return f.discontinued;
            if (currentFilter === 'sf') return f.sf;
            return true;
        });

        filtered.forEach(flavor => {
            const card = document.createElement('div');
            card.className = `flavor-card ${flavor.checked ? 'checked' : ''}`;
            card.setAttribute('data-id', flavor.id);
            card.innerHTML = `
                <div class="card-header">
                    <label class="checkbox-container" onclick="event.stopPropagation();">
                        <input type="checkbox" ${flavor.checked ? 'checked' : ''} onchange="toggleFlavor(${flavor.id}, this)">
                        <span class="checkmark"></span>
                    </label>
                    <div class="flavor-title">${flavor.name}</div>
                </div>
                <div class="badge-container">
                    <span class="badge ${flavor.discontinued ? 'discontinued-status' : 'active-status'}">${flavor.discontinued ? 'Discontinued' : 'Active'}</span>
                    ${flavor.sf ? '<span class="badge sugar-free">Sugar Free</span>' : ''}
                    ${flavor.seasonal ? '<span class="badge seasonal">Seasonal</span>' : ''}
                </div>`;
            card.addEventListener('click', () => {
                const cb = card.querySelector('input[type="checkbox"]');
                cb.checked = !cb.checked; toggleFlavor(flavor.id, cb);
            });
            grid.appendChild(card);
        });
    }

    window.toggleFlavor = function(id, checkbox) {
        const flavor = flavors.find(f => f.id === id);
        if (flavor) {
            flavor.checked = checkbox.checked;
            localStorage.setItem('rb_flavor_' + id, flavor.checked);
            const card = document.querySelector(`.flavor-card[data-id="${id}"]`);
            if (card) flavor.checked ? card.classList.add('checked') : card.classList.remove('checked');
            calculateStats();
        }
    };

    window.filterFlavors = function(filterType, element) {
        currentFilter = filterType;
        document.querySelectorAll('.filter-buttons .btn').forEach(b => b.classList.remove('active'));
        element.classList.add('active'); renderGrid();
    };

    document.getElementById('search-input').addEventListener('input', (e) => { searchQuery = e.target.value; renderGrid(); });

    loadSavedState(); calculateStats(); renderGrid();
</script>
</body>
</html>
